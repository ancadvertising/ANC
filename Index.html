<head>

  <title>نظام إدارة المهام - ANC</title>
  <!-- تضمين مكتبة Bootstrap لتنسيق عصري وسريع -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
    .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .badge-pending { background-color: #ffc107; color: #000; }
    .badge-progress { background-color: #0d6efd; color: #fff; }

<div class="container">
  <!-- رأس الصفحة ومعلومات الصلاحية -->
  <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
    <h2>📋 لوحة تحكم إدارة المهام والمشاريع</h2>
    <div>
      <span class="badge bg-dark p-2" id="userEmail">جاري التحميل...</span>
      <span class="badge bg-secondary p-2" id="userRole">...</span>
    </div>
  </div>

  <!-- جزء إضافة/تعديل مهمة (يظهر فقط للـ Admin والـ Project Manager) -->
  <div class="card p-4 hidden-component" id="managerActionPanel">
    <h4 class="mb-3" id="formTitle">🎯 تعيين مهمة جديدة لموظف</h4>
    <form id="taskForm" onsubmit="handleFormSubmit(event)">
      <input type="hidden" id="taskId">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">عنوان المهمة</label>
          <input type="text" class="form-style form-control" id="taskTitle" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">البريد الإلكتروني للمسؤول (Assignee)</label>
          <input type="email" class="form-control" id="taskAssignee" placeholder="member@anc-agency.com" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">تاريخ الانتهاء (Deadline)</label>
          <input type="date" class="form-control" id="taskDeadline" required>
        </div>
        <div class="col-12">
          <label class="form-label">وصف وتفاصيل المهمة</label>
          <textarea class="form-control" id="taskDescription" rows="2" required></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">مستوى الصلاحية المطلوب للتنفيذ</label>
          <select class="form-select" id="roleRequired">
            <option value="Team Member">عضو فريق عادي Team Member</option>
            <option value="Project Manager">مشرف مشروع Project Manager</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">حالة البداية</label>
          <select class="form-select" id="taskStatus">
            <option value="قيد الانتظار">قيد الانتظار</option>
            <option value="جاري العمل">جاري العمل</option>
            <option value="مكتملة">مكتملة</option>
          </select>
        </div>
        <div class="col-12 text-end">
          <button type="button" class="btn btn-light" onclick="resetTaskForm()">إلغاء</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">حفظ وتعيين المهمة</button>
        </div>
      </div>
    </form>
  </div>

  <!-- جدول عرض المهام المتاحة طبقاً للصلاحية -->
  <div class="card p-4">
    <h4 class="mb-3">📊 قائمة المهام الحالية</h4>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>ID المهمة</th>
            <th>العنوان</th>
            <th>الوصف</th>
            <th>المسؤول</th>
            <th>تاريخ الانتهاء</th>
            <th>الحالة</th>
            <th>إجراءات الصلاحية</th>
          </tr>
        </thead>
        <tbody id="tasksTableBody">
          <tr>
            <td colspan="7" class="text-center text-muted">جاري تحميل المهام المسموحة لصلاحيتك الحالية...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
