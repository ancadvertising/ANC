<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#090a0c">
    <title>ANC ERP - غير متصل</title>
    <style>
      :root{color-scheme:dark}*{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:#090a0c;color:#f7f7f5;font-family:Arial,Tahoma,sans-serif}.card{width:min(460px,100%);padding:32px;border:1px solid #2a2d32;border-radius:28px;background:#141619;box-shadow:0 28px 90px rgba(0,0,0,.42)}img{width:190px;height:auto;margin-bottom:38px}h1{margin:0 0 12px;font-size:28px}p{margin:0;color:#aeb2ba;line-height:1.9}button{width:100%;min-height:50px;margin-top:28px;border:0;border-radius:15px;background:#fff;color:#090a0c;font:700 15px inherit;cursor:pointer}
    </style>
  </head>
  <body>
    <main class="card">
      <img src="/assets/logo-light.png" alt="ANC Advertising">
      <h1>الاتصال غير متاح حاليًا</h1>
      <p>يمكنك فتح الأجزاء المحفوظة من الواجهة، لكن قراءة بيانات الشركة أو تعديلها تحتاج اتصالًا آمنًا بالإنترنت.</p>
      <button type="button" onclick="location.reload()">إعادة المحاولة</button>
    </main>
  </body>
</html>
